<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RangubabaSearch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    font-family: 'DM Sans', sans-serif;
    color: #e8e6f0;
    overflow-x: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(120,80,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,80,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 0;
  }
  .glow-orb {
    position: fixed; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(100,60,220,0.1) 0%, transparent 70%);
    top: 50%; left: 50%; transform: translate(-50%, -60%);
    pointer-events: none; z-index: 0;
  }
  #home {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2.5rem; padding: 2rem;
  }
  .logo-text {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 3rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #c4b5fd 0%, #818cf8 50%, #6366f1 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1; text-align: center;
  }
  .logo-sub {
    font-size: 0.75rem; font-weight: 300; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(200,190,255,0.4); text-align: center;
    margin-top: 0.4rem;
  }
  #results-page { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .results-header {
    display: flex; align-items: center; gap: 1.25rem;
    padding: 1rem 2rem; border-bottom: 1px solid rgba(130,100,255,0.12);
    background: rgba(10,10,15,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .header-logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
    background: linear-gradient(135deg, #c4b5fd, #6366f1);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    white-space: nowrap; cursor: pointer;
  }
  .results-body { max-width: 680px; padding: 2rem; }
  .search-wrap { position: relative; width: 100%; max-width: 580px; }
  .search-icon {
    position: absolute; left: 1.1rem; top: 50%; transform: translateY(-50%);
    color: rgba(200,190,255,0.35); pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(130,100,255,0.2);
    border-radius: 14px;
    padding: 0.85rem 1rem 0.85rem 3rem;
    font-family: 'DM Sans', sans-serif; font-size: 1rem;
    color: #e8e6f0; outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    caret-color: #a78bfa;
  }
  .search-input::placeholder { color: rgba(200,190,255,0.25); }
  .search-input:focus {
    border-color: rgba(130,100,255,0.6);
    background: rgba(255,255,255,0.06);
    box-shadow: 0 0 0 3px rgba(120,80,255,0.1);
  }
  .engine-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .engine-label {
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(200,190,255,0.3); margin-right: 0.25rem;
  }
  .engine-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(130,100,255,0.15);
    border-radius: 8px; padding: 0.3rem 0.75rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.8rem;
    color: rgba(200,190,255,0.5); cursor: pointer; transition: all 0.15s;
  }
  .engine-btn:hover { background: rgba(120,80,255,0.1); border-color: rgba(130,100,255,0.4); color: #c4b5fd; }
  .engine-btn.active { background: rgba(120,80,255,0.18); border-color: rgba(130,100,255,0.55); color: #c4b5fd; }
  .result-item {
    margin-bottom: 1.75rem; padding-bottom: 1.75rem;
    border-bottom: 1px solid rgba(130,100,255,0.08);
  }
  .result-item:last-child { border-bottom: none; }
  .result-url {
    font-size: 0.75rem; color: rgba(200,190,255,0.35);
    margin-bottom: 0.3rem; letter-spacing: 0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-title {
    font-size: 1.05rem; font-weight: 500; color: #c4b5fd;
    text-decoration: none; line-height: 1.4; display: block; margin-bottom: 0.35rem;
    transition: color 0.15s;
  }
  .result-title:hover { color: #a78bfa; text-decoration: underline; }
  .result-snippet { font-size: 0.875rem; color: rgba(220,215,255,0.55); line-height: 1.65; }
  .status-msg {
    color: rgba(200,190,255,0.4); font-size: 0.9rem;
    padding: 3rem 0; text-align: center;
  }
  .results-meta {
    font-size: 0.75rem; color: rgba(200,190,255,0.3);
    margin-bottom: 1.5rem; letter-spacing: 0.04em;
  }
  .pagination { display: flex; gap: 0.5rem; margin-top: 2rem; flex-wrap: wrap; }
  .page-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(130,100,255,0.2);
    border-radius: 8px; padding: 0.4rem 0.9rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    color: rgba(200,190,255,0.5); cursor: pointer; transition: all 0.15s;
  }
  .page-btn:hover { background: rgba(120,80,255,0.1); color: #c4b5fd; }
  .page-btn.active { background: rgba(120,80,255,0.2); border-color: rgba(130,100,255,0.6); color: #c4b5fd; }
  .footer { font-size: 0.7rem; color: rgba(200,190,255,0.18); letter-spacing: 0.08em; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow-orb"></div>

<!-- HOME -->
<div id="home">
  <div>
    <div class="logo-text">RangubabaSearch</div>
    <div class="logo-sub">Search without limits</div>
  </div>
  <div style="width:100%;max-width:580px;display:flex;flex-direction:column;gap:1rem;align-items:center;">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="home-input" type="text" placeholder="Search anything…" autocomplete="off" />
    </div>
    <div class="engine-row">
      <span class="engine-label">safe search</span>
      <button class="engine-btn active" data-safe="off">Off</button>
      <button class="engine-btn" data-safe="medium">Medium</button>
      <button class="engine-btn" data-safe="high">High</button>
    </div>

<!-- RESULTS -->
<div id="results-page">
  <div class="results-header">
    <div class="header-logo" id="back-home">Rangubaba</div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" id="results-input" type="text" placeholder="Search…" autocomplete="off" />
    </div>
  </div>
  <div class="results-body">
    <div id="results-meta" class="results-meta"></div>
    <div id="results-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<script>
  const API_KEY = 'AIzaSyCPnjD3nneeBFxQErjE5tnQ7ePJB3eHOs4';
  const CX = 'f5f55fadea2f840dc';

  let safeSearch = 'off';
  let currentQuery = '';
  let currentStart = 1;

  document.querySelectorAll('[data-safe]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-safe]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      safeSearch = btn.dataset.safe;
    });
  });

  async function doSearch(q, start = 1) {
    if (!q.trim()) return;
    currentQuery = q.trim();
    currentStart = start;

    document.getElementById('home').style.display = 'none';
    document.getElementById('results-page').style.display = 'block';
    document.getElementById('results-input').value = q;
    document.getElementById('results-list').innerHTML = '<div class="status-msg">Searching…</div>';
    document.getElementById('results-meta').textContent = '';
    document.getElementById('pagination').innerHTML = '';

    try {
      const url = `https://www.googleapis.com/customsearch/v1?key=${API_KEY}&cx=${CX}&q=${encodeURIComponent(q)}&start=${start}&safe=${safeSearch}`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.error) {
        document.getElementById('results-list').innerHTML = `<div class="status-msg">Error: ${data.error.message}</div>`;
        return;
      }

      if (data.items && data.items.length) {
        const total = data.searchInformation?.totalResults;
        if (total) {
          document.getElementById('results-meta').textContent = `About ${parseInt(total).toLocaleString()} results (${data.searchInformation.formattedSearchTime}s)`;
        }
        document.getElementById('results-list').innerHTML = data.items.map(item => `
          <div class="result-item">
            <div class="result-url">${item.displayLink || ''}</div>
            <a class="result-title" href="${item.link}" target="_blank">${item.title}</a>
            <div class="result-snippet">${item.snippet || ''}</div>
          </div>
        `).join('');

        const totalNum = Math.min(parseInt(total), 100);
        const pages = Math.ceil(totalNum / 10);
        const currentPage = Math.ceil(start / 10);
        let paginationHTML = '';
        for (let i = 1; i <= Math.min(pages, 10); i++) {
          const s = (i - 1) * 10 + 1;
          paginationHTML += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-start="${s}">${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = paginationHTML;
        document.querySelectorAll('.page-btn').forEach(btn => {
          btn.addEventListener('click', () => doSearch(currentQuery, parseInt(btn.dataset.start)));
        });
      } else {
        document.getElementById('results-list').innerHTML = '<div class="status-msg">No results found. Try a different search.</div>';
      }
    } catch(e) {
      document.getElementById('results-list').innerHTML = '<div class="status-msg">Something went wrong. Please try again.</div>';
    }
  }

  document.getElementById('home-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(e.target.value);
  });
  document.getElementById('results-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch(e.target.value);
  });
  document.getElementById('back-home').addEventListener('click', () => {
    document.getElementById('results-page').style.display = 'none';
    document.getElementById('home').style.display = 'flex';
    document.getElementById('home-input').value = '';
    document.getElementById('home-input').focus();
  });
</script>
</body>
</html>
